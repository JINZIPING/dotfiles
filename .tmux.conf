# 设置Ctrl + a
unbind C-b
set -g prefix 'C-f'

# 更改分屏快捷键
bind k split-window -vb -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind h split-window -hb -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"

# temp full screen
bind -n M-f resize-pane -Z
bind -n M-\; copy-mode

# window
bind -n M-n next-window
bind a command-prompt -p "Session name:" "new-session -s '%%'"


# 使用 Alt + hjkl 快速切换面板
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U

# 快捷键绑定：开启 / 关闭 鼠标
bind m set -g mouse on
bind M set -g mouse off

# 状态栏美化
# ---------- 状态栏 ----------
set -g status on
set -g status-bg colour235
set -g status-fg colour250
set -g status-left-length 200
set -g status-right-length 80

# ---------- 左侧：Session Tabs（可点击） ----------
set -g status-left "#(tmux -S #{socket_path} list-sessions -F '#{?session_attached,#[fg=colour235,bg=colour39,bold],#[fg=colour245]}#[link=tmux switch-client -t #{session_name}] #{session_name} #[default]')"

# ---------- 中间：Window Tabs（可点击） ----------
set -g window-status-format "#[fg=colour245]#[link=select-window -t #{window_index}] #{window_index}:#{window_name} #[default]"
set -g window-status-current-format "#[fg=colour235,bg=colour135,bold]#[link=select-window -t #{window_index}] #{window_index}:#{window_name} #[default]"

# rainbarf
set -g status-right '#[fg=colour250]%Y-%m-%d #[fg=colour135]%H:%M #[fg=colour240]| #[default]#(RAINBARF=~/.rainbarf.conf rainbarf)'

# 增加历史缓冲区
set -g history-limit 100000

# 使用 vi copy-mode 键位
setw -g mode-keys vi

# 进入copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# 优化翻页键
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down
bind-key -T copy-mode-vi C-u send-keys -X halfpage-up

set-option -g set-clipboard on

# reload config
bind r source-file ~/.tmux.conf \; display "reloaded!"
